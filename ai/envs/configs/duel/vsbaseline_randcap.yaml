game:
  map_config: cn
  num_players: 2
  max_players: 6
  max_turns: 150
  capital_mode: random

reward:
  win: 100.0
  lose: -100.0
  shaped:
    territory_gain: 1.0
    territory_loss: -1.0
    capital_capture: 20.0
    step_penalty: -0.2

observation:
  max_troops: 500
  max_growth: 10
  cmd_max: 16
  use_adjacency: true       # 全地图邻接矩阵进观测（N*N bit，N=31）

action:
  troop_buckets: [0.25, 0.5, 0.75, 1.0]

training:
  mode: vsbaseline          # 训练范式：vsbaseline | self_play
  opponent: random          # 对手类型：random | rule
