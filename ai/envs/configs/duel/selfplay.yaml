game:
  map_config: cn
  num_players: 2
  max_players: 6
  max_turns: 150
  capital_mode: random

reward:
  win: 100.0
  lose: -100.0
  shaped:
    territory_gain: 1.0
    territory_loss: -1.0
    capital_capture: 20.0
    step_penalty: -0.2

observation:
  max_troops: 500
  max_growth: 10
  cmd_max: 16
  use_adjacency: true       # 邻接信息进观测（is_adj_to_my_territory，1 bit/region）

action:
  troop_buckets: [0.25, 0.5, 0.75, 1.0]

training:
  mode: self_play
  opponent: pool           # 对手由训练编排层动态注入
